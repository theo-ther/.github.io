<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Decks - Manager Kolejki</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #181a23;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #8a8f9f;
            --danger-color: #ff3366;
            --btn-bg: #222533;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* PANEL LEWY: Zarządzanie i zapisy */
        .admin-panel {
            width: 380px;
            background-color: var(--card-bg);
            border-right: 2px solid #222533;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222533;
            border: 1px solid #33384f;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ccb0;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
            margin-top: 10px;
        }
        .btn-danger:hover {
            background: #e02253;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        /* Kontener dzielący przestrzeń na listy */
        .lists-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .queue-section, .history-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scroll-box {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .queue-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .queue-list {
            list-style: none;
        }

        .queue-item {
            background: var(--btn-bg);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--text-muted);
        }

        .queue-item.next {
            border-left-color: var(--accent-color);
            background: #282d42;
        }

        .queue-item .dj-info {
            display: flex;
            align-items: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }

        .queue-item .index {
            font-weight: bold;
            color: var(--accent-color);
            margin-right: 10px;
            min-width: 25px;
        }

        .item-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-action {
            width: auto;
            padding: 6px 8px;
            font-size: 0.85rem;
            background: #2d3147;
            color: #fff;
            border: 1px solid #3d4363;
            text-transform: none;
        }
        .btn-action:hover {
            background: #3d4363;
            box-shadow: none;
        }
        .btn-action:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            background: #1a1d29;
        }

        .btn-delete {
            border-color: var(--danger-color);
            color: var(--danger-color);
            background: transparent;
        }
        .btn-delete:hover {
            background: var(--danger-color);
            color: #fff;
        }

        /* PANEL PRAWY: Wielki ekran dla ludzi */
        .display-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            position: relative;
            transition: background-color 0.5s;
        }

        .display-panel.alarm {
            background-color: rgba(255, 51, 102, 0.2);
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            from { background-color: rgba(255, 51, 102, 0.1); }
            to { background-color: rgba(255, 51, 102, 0.4); }
        }

        .current-label {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .current-dj {
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            word-break: break-word;
            max-width: 90%;
        }

        .timer {
            font-size: 14rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--accent-color);
            line-height: 1;
            text-shadow: 0 0 50px rgba(0, 255, 204, 0.3);
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .toggle-admin {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            border: 1px solid #33384f;
            color: var(--text-muted);
            padding: 5px 10px;
            width: auto;
            font-size: 0.8rem;
        }
        .toggle-admin:hover {
            background: #222533;
            color: #fff;
            box-shadow: none;
        }

        body.hide-admin .admin-panel {
            display: none;
        }
    </style>
</head>
<body>

    <!-- PANEL STEROWANIA I ZAPISÓW -->
    <div class="admin-panel" id="adminPanel">
        <h2>Open Decks</h2>
        
        <div class="form-group">
            <input type="text" id="djInput" placeholder="Wpisz ksywę DJ-a..." autocomplete="off">
            <button id="addBtn">Dodaj do kolejki</button>
        </div>

        <div class="queue-title">Odtwarzacz</div>
        <div class="form-group" style="margin-bottom: 20px;">
            <button id="startNextBtn" style="background: #fff; color: #000;">Odpal następnego</button>
            <div class="controls-row">
                <button id="pauseBtn" style="background: #33384f; color: #fff; padding: 8px;">Pauza</button>
                <button id="resetTimerBtn" style="background: #33384f; color: #fff; padding: 8px;">Reset 30m</button>
            </div>
            <button id="removeCurrentBtn" class="btn-danger" style="padding: 8px; font-size: 0.85rem;">Usuń obecnego</button>
        </div>

        <!-- SEKCJE LIST (KOLEJKA + HISTORIA) -->
        <div class="lists-container">
            <!-- KOLEJKA -->
            <div class="queue-section">
                <div class="queue-title">Kolejka oczekujących (<span id="queueCount">0</span>)</div>
                <div class="scroll-box">
                    <ul class="queue-list" id="queueList"></ul>
                </div>
            </div>

            <!-- HISTORIA -->
            <div class="history-section">
                <div class="queue-title" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Zagrali (<span id="historyCount">0</span>)</span>
                    <button id="clearHistoryBtn" style="width: auto; padding: 2px 8px; font-size: 0.75rem; background: transparent; color: var(--text-muted); border: 1px solid #33384f; text-transform: none;">Wyczyść</button>
                </div>
                <div class="scroll-box">
                    <ul class="queue-list" id="historyList" style="opacity: 0.85;"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- WIELKI EKRAN DLA LUDZI -->
    <div class="display-panel" id="displayPanel">
        <button class="toggle-admin" id="toggleAdminBtn">Ukryj/Pokaż Panel boczny</button>
        
        <div class="current-label" id="statusLabel">Teraz gra</div>
        <div class="current-dj" id="currentDjDisplay">Brak wykonawcy</div>
        <div class="timer" id="timerDisplay">30:00</div>
    </div>

    <script>
        // Stan aplikacji
        let queue = [];
        let history = [];
        let currentDJ = null;
        let timerInterval = null;
        let defaultTime = 30 * 60; // 30 minut w sekundach
        let timeLeft = defaultTime;
        let isPaused = true;

        // Elementy DOM
        const djInput = document.getElementById('djInput');
        const addBtn = document.getElementById('addBtn');
        const queueList = document.getElementById('queueList');
        const queueCount = document.getElementById('queueCount');
        const historyList = document.getElementById('historyList');
        const historyCount = document.getElementById('historyCount');
        const currentDjDisplay = document.getElementById('currentDjDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusLabel = document.getElementById('statusLabel');
        const displayPanel = document.getElementById('displayPanel');
        
        // Przyciski sterowania
        const startNextBtn = document.getElementById('startNextBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetTimerBtn = document.getElementById('resetTimerBtn');
        const removeCurrentBtn = document.getElementById('removeCurrentBtn');
        const toggleAdminBtn = document.getElementById('toggleAdminBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        // Ładowanie z localStorage
        if (localStorage.getItem('deckQueue')) {
            queue = JSON.parse(localStorage.getItem('deckQueue'));
            updateQueueUI();
        }
        if (localStorage.getItem('deckHistory')) {
            history = JSON.parse(localStorage.getItem('deckHistory'));
            updateHistoryUI();
        }

        function saveToStorage() {
            localStorage.setItem('deckQueue', JSON.stringify(queue));
            localStorage.setItem('deckHistory', JSON.stringify(history));
        }

        // Dodawanie DJa
        function addDJ() {
            const name = djInput.value.trim();
            if (name === "") return;
            
            queue.push(name);
            djInput.value = "";
            djInput.focus();
            
            saveToStorage();
            updateQueueUI();

            if (!currentDJ) {
                prepareNextDJ();
            }
        }

        addBtn.addEventListener('click', addDJ);
        djInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addDJ();
        });

        // Przesuwanie kolejki
        window.moveUp = function(index) {
            if (index > 0) {
                const temp = queue[index];
                queue[index] = queue[index - 1];
                queue[index - 1] = temp;
                saveToStorage();
                updateQueueUI();
            }
        }

        window.moveDown = function(index) {
            if (index < queue.length - 1) {
                const temp = queue[index];
                queue[index] = queue[index + 1];
                queue[index + 1] = temp;
                saveToStorage();
                updateQueueUI();
            }
        }

        // Usuwanie z kolejki oczekujących
        window.removeFromQueue = function(index) {
            queue.splice(index, 1);
            saveToStorage();
            updateQueueUI();
        }

        // NOWOŚĆ: Usuwanie pojedynczej osoby z historii
        window.removeFromHistory = function(index) {
            history.splice(index, 1);
            saveToStorage();
            updateHistoryUI();
        }

        // Aktualizacja UI listy oczekujących
        function updateQueueUI() {
            queueList.innerHTML = "";
            queueCount.textContent = queue.length;

            queue.forEach((dj, index) => {
                const isFirst = (index === 0);
                const isLast = (index === queue.length - 1);

                const li = document.createElement('li');
                li.className = `queue-item ${isFirst ? 'next' : ''}`;
                
                li.innerHTML = `
                    <div class="dj-info">
                        <span class="index">#${index + 1}</span>
                        <span title="${dj}">${dj}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-action" onclick="moveUp(${index})" ${isFirst ? 'disabled' : ''}>▲</button>
                        <button class="btn-action" onclick="moveDown(${index})" ${isLast ? 'disabled' : ''}>▼</button>
                        <button class="btn-action btn-delete" onclick="removeFromQueue(${index})">Usuń</button>
                    </div>
                `;
                queueList.appendChild(li);
            });
        }

        // Aktualizacja UI Historii z opcją usuwania pojedynczo
        function updateHistoryUI() {
            historyList.innerHTML = "";
            historyCount.textContent = history.length;

            // Renderujemy od najnowszych do najstarszych, zachowując prawidłowy indeks tablicy
            for (let i = history.length - 1; i >= 0; i--) {
                const dj = history[i];
                const li = document.createElement('li');
                li.className = 'queue-item';
                li.style.borderLeftColor = 'var(--text-muted)';
                li.innerHTML = `
                    <div class="dj-info">
                        <span class="index" style="color: var(--text-muted)">✓</span>
                        <span title="${dj}">${dj}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-action btn-delete" onclick="removeFromHistory(${i})">Usuń</button>
                    </div>
                `;
                historyList.appendChild(li);
            }
        }

        // Przygotowanie kolejnego DJ-a
        function prepareNextDJ() {
            if (currentDJ) {
                history.push(currentDJ);
                updateHistoryUI();
            }

            if (queue.length > 0) {
                currentDJ = queue.shift();
                currentDjDisplay.textContent = currentDJ;
                statusLabel.textContent = "Teraz gra";
                timeLeft = defaultTime;
                updateTimerDisplay();
                saveToStorage();
                updateQueueUI();
                startTimer();
            } else {
                currentDJ = null;
                currentDjDisplay.textContent = "Brak wykonawcy";
                statusLabel.textContent = "Oczekiwanie";
                clearInterval(timerInterval);
                isPaused = true;
                pauseBtn.textContent = "Start";
                timeLeft = defaultTime;
                updateTimerDisplay();
                displayPanel.classList.remove('alarm');
                saveToStorage();
            }
        }

        function forceNextDJ() {
            displayPanel.classList.remove('alarm');
            prepareNextDJ();
        }

        // Timer
        function startTimer() {
            clearInterval(timerInterval);
            isPaused = false;
            pauseBtn.textContent = "Pauza";
            displayPanel.classList.remove('alarm');

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateTimerDisplay();

                    if (timeLeft <= 30 && timeLeft > 0) {
                        displayPanel.classList.add('alarm');
                    }

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        forceNextDJ();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Kontrolery przycisków
        pauseBtn.addEventListener('click', () => {
            if (!currentDJ && queue.length > 0) {
                prepareNextDJ();
                return;
            }
            if (!currentDJ) return;

            if (isPaused) {
                isPaused = false;
                pauseBtn.textContent = "Pauza";
                if(!timerInterval) startTimer();
            } else {
                isPaused = true;
                pauseBtn.textContent = "Wznów";
            }
        });

        startNextBtn.addEventListener('click', forceNextDJ);

        resetTimerBtn.addEventListener('click', () => {
            timeLeft = defaultTime;
            updateTimerDisplay();
            displayPanel.classList.remove('alarm');
        });

        removeCurrentBtn.addEventListener('click', () => {
            currentDJ = null;
            currentDjDisplay.textContent = "Brak wykonawcy";
            statusLabel.textContent = "Oczekiwanie";
            clearInterval(timerInterval);
            timeLeft = defaultTime;
            updateTimerDisplay();
            displayPanel.classList.remove('alarm');
            pauseBtn.textContent = "Start";
            isPaused = true;
            saveToStorage();
        });

        // Czyszczenie historii z potwierdzeniem
        clearHistoryBtn.addEventListener('click', () => {
            if(confirm("Czy na pewno chcesz wyczyścić CAŁĄ listę zagranych osób?")) {
                history = [];
                saveToStorage();
                updateHistoryUI();
            }
        });

        toggleAdminBtn.addEventListener('click', () => {
            document.body.classList.toggle('hide-admin');
        });
    </script>
</body>
</html>
